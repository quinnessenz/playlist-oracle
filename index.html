<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>playlist oracle</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{background:#0d0d0d;color:#f0f0f0;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;padding:20px 16px 60px;min-height:100vh}
h1{font-size:20px;font-weight:700;letter-spacing:-0.02em;margin:0 0 4px}
.sub{font-size:13px;color:#444;margin:0 0 24px}
.sec{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;margin:0 0 10px}
.s-sec{color:#7c9eff}.f-sec{color:#ff7eb3}
.tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px}
.tag{padding:9px 16px;border-radius:99px;font-size:13px;font-weight:400;cursor:pointer;border:1.5px solid #2e2e2e;background:#1c1c1c;color:#777;font-family:inherit;line-height:1;transition:all .1s;outline:none;user-select:none}
.tag.s-on{border:2.5px solid #7c9eff;background:#7c9eff22;color:#fff;font-weight:600}
.tag.f-on{border:2.5px solid #ff7eb3;background:#ff7eb322;color:#fff;font-weight:600}
.divider{height:1px;background:#1e1e1e;margin:0 0 20px}
.empty{color:#2e2e2e;font-size:15px;text-align:center;padding:3rem 0}
.results-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.count{font-size:13px;color:#555}
.clear-btn{font-size:12px;color:#444;background:none;border:none;cursor:pointer;font-family:inherit}
.card{border-radius:12px;border:1px solid #252525;background:#161616;padding:14px;margin-bottom:10px}
.card-top{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:5px}
.card-name{font-size:15px;font-weight:500;color:#f0f0f0;margin:0 0 3px;line-height:1.3;word-break:break-word}
.card-sub{font-size:12px;color:#555;margin:0;line-height:1.4}
.card-seasonal{font-size:11px;color:#333;margin:0}
.sp-btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:10px;border-radius:8px;background:#1DB954;color:#000;font-family:inherit;font-size:13px;font-weight:700;text-decoration:none;border:none;width:100%;cursor:pointer}
.no-match{text-align:center;padding:2.5rem 0}
.no-match p{color:#555;font-size:14px;margin:0 0 14px}
.no-match button{font-size:13px;color:#888;background:none;border:1px solid #2a2a2a;border-radius:99px;padding:9px 20px;cursor:pointer;font-family:inherit}
.more-btn{width:100%;padding:12px;border-radius:10px;background:#181818;border:1px solid #252525;color:#555;font-size:13px;cursor:pointer;font-family:inherit;margin-top:2px}
</style>
</head>

const SVG_SPOTIFY=`<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>`;

let selS=new Set(),selF=new Set(),showAll=false;
const LIMIT=5;

function buildTags(elId,items,sel,cls,cb){
  const el=document.getElementById(elId);
  el.innerHTML='';
  items.forEach(t=>{
    const b=document.createElement('button');
    b.className='tag'+(sel.has(t)?' '+cls:'');
    b.textContent=t;
    b.onclick=()=>cb(t);
    el.appendChild(b);
  });
}

function render(){
  buildTags('st',SS,selS,'s-on',id=>{selS.has(id)?selS.delete(id):selS.add(id);showAll=false;render();});
  buildTags('ft',FF,selF,'f-on',id=>{selF.has(id)?selF.delete(id):selF.add(id);showAll=false;render();});

  const res=document.getElementById('res');
  const has=selS.size>0||selF.size>0;
  if(!has){res.innerHTML='<p class="empty">✦ select a setting or vibe above</p>';return;}

  const matches=PL.filter(pl=>{
    for(const s of selS)if(!pl.s.includes(s))return false;
    for(const f of selF)if(!pl.f.includes(f))return false;
    return true;
  });

  if(!matches.length){
    res.innerHTML='<div class="no-match"><p>nothing matches all of those</p><button onclick="clearAll()">clear filters</button></div>';
    return;
  }

  const shown=showAll?matches:matches.slice(0,LIMIT);
  let h=`<div class="results-hdr"><span class="count">${matches.length} playlist${matches.length!==1?'s':''}</span><button class="clear-btn" onclick="clearAll()">clear ×</button></div>`;

  shown.forEach(pl=>{
    const isSeasonal=pl.sub==='seasonal'||pl.sub?.startsWith('seasonal');
    const subHtml=pl.sub&&!isSeasonal?`<p class="card-sub">${pl.sub}</p>`:isSeasonal?`<p class="card-seasonal">seasonal</p>`:'';
    h+=`<div class="card"><div class="card-top"><div class="dot" style="background:${pl.c}"></div><div><p class="card-name">${pl.n}</p>${subHtml}</div></div><a class="sp-btn" href="${pl.url}" target="_blank" rel="noopener">${SVG_SPOTIFY} open in Spotify</a></div>`;
  });

  if(matches.length>LIMIT&&!showAll){
    h+=`<button class="more-btn" onclick="showMore()">show ${matches.length-LIMIT} more</button>`;
  }
  res.innerHTML=h;
}

function clearAll(){selS.clear();selF.clear();showAll=false;render();}
function showMore(){showAll=true;render();}
render();
</script>
</body>
</html>
